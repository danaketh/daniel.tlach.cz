<article itemScope="" itemType="http://schema.org/NewsArticle"{{ if .Params.recipe }} class="recipe"{{ end }}>
    {{ with .Params.thumbnail }}
        <img src="{{ . }}" alt="thumbnail" class="p-article__thumbnail{{ with $.Params.thumbnail_filter }} filter--{{ . }}{{ end }}">
    {{ end }}
    <h1 itemProp="headline">
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
    </h1>
    <time itemProp="datePublished" dateTime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" | safeHTML }}">
        {{ .Date | time.Format ":date_long" }}
    </time>
    <div itemProp="articleBody">
        {{ .Summary | safeHTML }}
    </div>
</article>
