<div class="recipe-meta">
    {{ with .Get "prep" }}<div class="meta-item"><span class="meta-label">Prep time</span><span class="meta-value">{{ . }}</span></div>{{ end }}
    {{ with .Get "cook" }}<div class="meta-item"><span class="meta-label">Cook time</span><span class="meta-value">{{ . }}</span></div>{{ end }}
    {{ with .Get "serves" }}<div class="meta-item"><span class="meta-label">Serves</span><span class="meta-value">{{ . }}</span></div>{{ end }}
    {{ with .Get "difficulty" }}<div class="meta-item"><span class="meta-label">Difficulty</span><span class="meta-value">{{ . }}</span></div>{{ end }}
</div>
