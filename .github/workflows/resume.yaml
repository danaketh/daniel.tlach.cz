name: Build and Release Resume

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Set version from date
        id: version
        run: echo "tag=$(date +%Y.%m.%d)" >> $GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run Python preparation script
        run: python bin/prepare_resume.py

      - name: Build regular resume
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex
          working_directory: resume

      - name: Build full resume
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume_full.tex
          working_directory: resume

      - name: Rename PDFs
        run: |
          mv resume/resume.pdf "resume/Daniel_Tlach_Resume_${{ steps.version.outputs.tag }}.pdf"
          mv resume/resume_full.pdf "resume/Daniel_Tlach_Resume_Full_${{ steps.version.outputs.tag }}.pdf"

      - name: Release regular PDF
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Resume ${{ steps.version.outputs.tag }}
          files: resume/Daniel_Tlach_Resume_${{ steps.version.outputs.tag }}.pdf
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release full PDF
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Resume Full ${{ steps.version.outputs.tag }}
          files: resume/Daniel_Tlach_Resume_Full_${{ steps.version.outputs.tag }}.pdf
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}